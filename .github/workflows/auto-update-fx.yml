name: Auto-actualizar FX diario

on:
  schedule:
    - cron: '0 19 * * 1-5'   # 19:00 UTC = 16:00 AR (lun-vie)
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha YYYY-MM-DD (vacío = hoy AR)'
        required: false
        default: ''
      valor_manual:
        description: 'Valor FX manual (omitir para usar criptoya.com)'
        required: false
        default: ''

jobs:
  update-fx:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar update
        env:
          INPUT_FECHA: ${{ github.event.inputs.fecha }}
          INPUT_VALOR: ${{ github.event.inputs.valor_manual }}
        run: python3 scripts/run_workflow.py

      - name: Commit y push
        run: |
          git config user.name "fx-bot[auto]"
          git config user.email "fx-bot@seguimiento-fx.local"
          if git diff --quiet index.html; then
            echo "Sin cambios — ya actualizado o no hubo rueda hoy."
          else
            git add index.html
            git commit -m "auto: FX $(TZ='America/Argentina/Buenos_Aires' date +%Y-%m-%d) (criptoya.com)"
            git push
          fi
